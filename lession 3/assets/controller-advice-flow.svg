<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img">
  <title>ControllerAdvice Exception Handling Flow</title>
  <defs>
    <style>
      .t{font:700 28px 'Segoe UI',Arial;fill:#0f172a}.s{font:600 16px 'Segoe UI',Arial;fill:#475569}.l{font:700 18px 'Segoe UI',Arial;fill:#fff}.sl{font:500 13px 'Segoe UI',Arial;fill:#fff}.tx{font:500 14px 'Segoe UI',Arial;fill:#334155}.mn{font:600 13px Consolas,monospace}
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#e2e8f0"/></linearGradient>
    <marker id="aR" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/></marker>
    <marker id="aD" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/></marker>
    <marker id="aP" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/></marker>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)" rx="12"/>
  <text x="600" y="38" text-anchor="middle" class="t">@ControllerAdvice — Xu ly Exception tap trung</text>
  <text x="600" y="62" text-anchor="middle" class="s">Khong can try-catch trong tung Controller — mot noi xu ly tat ca!</text>

  <rect x="40" y="90" width="160" height="90" rx="14" fill="#0ea5e9"/>
  <text x="120" y="128" text-anchor="middle" class="l">Client</text>
  <text x="120" y="152" text-anchor="middle" class="sl">Browser / Postman</text>

  <line x1="210" y1="135" x2="280" y2="135" stroke="#3b82f6" stroke-width="3" marker-end="url(#aR)"/>

  <rect x="290" y="85" width="200" height="100" rx="14" fill="#3b82f6"/>
  <text x="390" y="118" text-anchor="middle" class="l">Controller</text>
  <text x="390" y="140" text-anchor="middle" class="sl">@Valid @RequestBody</text>
  <text x="390" y="160" text-anchor="middle" class="sl">Validation check</text>

  <line x1="500" y1="135" x2="570" y2="135" stroke="#3b82f6" stroke-width="3" marker-end="url(#aR)"/>

  <rect x="580" y="85" width="200" height="100" rx="14" fill="#16a34a"/>
  <text x="680" y="118" text-anchor="middle" class="l">Service</text>
  <text x="680" y="140" text-anchor="middle" class="sl">Business Logic</text>
  <text x="680" y="160" text-anchor="middle" class="sl">throw Exception</text>

  <line x1="390" y1="195" x2="390" y2="250" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="390" y1="250" x2="530" y2="310" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#aD)"/>
  <line x1="680" y1="195" x2="680" y2="250" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="680" y1="250" x2="630" y2="310" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#aD)"/>

  <rect x="270" y="225" width="195" height="22" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="367" y="241" text-anchor="middle" class="mn" fill="#ef4444" font-size="11">MethodArgumentNotValidEx</text>
  <rect x="625" y="225" width="195" height="22" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="722" y="241" text-anchor="middle" class="mn" fill="#ef4444" font-size="11">ResourceNotFoundException</text>

  <rect x="420" y="310" width="320" height="140" rx="16" fill="#8b5cf6"/>
  <rect x="435" y="315" width="290" height="30" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="580" y="336" text-anchor="middle" class="l" font-size="15">@ControllerAdvice</text>
  <text x="580" y="365" text-anchor="middle" class="l" font-size="14">GlobalExceptionHandler</text>
  <rect x="440" y="378" width="280" height="22" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="450" y="394" class="mn" fill="#fbbf24" font-size="11">@ExceptionHandler(NotFound)</text>
  <rect x="440" y="404" width="280" height="22" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="450" y="420" class="mn" fill="#fbbf24" font-size="11">@ExceptionHandler(Validation)</text>
  <rect x="440" y="430" width="280" height="16" rx="5" fill="rgba(255,255,255,0.08)"/>
  <text x="450" y="443" class="mn" fill="rgba(255,255,255,0.7)" font-size="10">@ExceptionHandler(Exception)</text>

  <line x1="580" y1="460" x2="580" y2="500" stroke="#8b5cf6" stroke-width="3" marker-end="url(#aP)"/>

  <rect x="180" y="498" width="830" height="55" rx="14" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="190" y="510" width="180" height="36" rx="10" fill="#ef4444"/>
  <text x="280" y="533" text-anchor="middle" class="sl">400 Validation Error</text>
  <rect x="400" y="510" width="180" height="36" rx="10" fill="#f59e0b"/>
  <text x="490" y="533" text-anchor="middle" class="sl">404 Not Found</text>
  <rect x="610" y="510" width="180" height="36" rx="10" fill="#3b82f6"/>
  <text x="700" y="533" text-anchor="middle" class="sl">409 Conflict</text>
  <rect x="820" y="510" width="180" height="36" rx="10" fill="#64748b"/>
  <text x="910" y="533" text-anchor="middle" class="sl">500 Server Error</text>
  <text x="1020" y="530" text-anchor="middle" class="mn" fill="#8b5cf6" font-size="12">ApiResponse</text>

  <rect x="870" y="90" width="300" height="185" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="1020" y="115" text-anchor="middle" class="tx" font-weight="700" fill="#16a34a">Loi ich</text>
  <text x="890" y="140" class="tx" fill="#16a34a">✓ Khong can try-catch</text>
  <text x="890" y="162" class="tx" fill="#16a34a">✓ Code sach, tuan thu DRY</text>
  <text x="890" y="184" class="tx" fill="#16a34a">✓ Response deu chuan format</text>
  <text x="890" y="206" class="tx" fill="#16a34a">✓ De mo rong Exception moi</text>
  <text x="890" y="228" class="tx" fill="#16a34a">✓ 1 noi xu ly tat ca Controller</text>

  <rect x="870" y="290" width="300" height="120" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="1020" y="315" text-anchor="middle" class="tx" font-weight="700" fill="#dc2626">Khong co @ControllerAdvice</text>
  <text x="890" y="340" class="tx" fill="#dc2626">✗ try-catch o moi method</text>
  <text x="890" y="362" class="tx" fill="#dc2626">✗ Code lap, kho bao tri</text>
  <text x="890" y="384" class="tx" fill="#dc2626">✗ Response khong nhat quan</text>
</svg>
