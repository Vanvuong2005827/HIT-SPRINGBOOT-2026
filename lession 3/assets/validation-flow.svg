<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Validation Flow</title>
  <desc id="desc">Diagram showing where validation should happen in the request flow and what happens without it</desc>

  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .sublabel { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .text-sm { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .mono { font: 600 13px 'Consolas', monospace; fill: #334155; }
      .arrow-label { font: 600 14px 'Segoe UI', Arial, sans-serif; }
      .badge { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #fff; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" class="title">Tai sao can Validation?</text>
  <text x="600" y="62" text-anchor="middle" class="subtitle">Validate cang som cang tot — tai tang Controller, truoc khi du lieu di vao Service/Database</text>

  <!-- === ROW 1: Without Validation (BAD) === -->
  <rect x="30" y="85" width="1140" height="175" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="42" y="93" width="28" height="28" rx="14" fill="#ef4444"/>
  <text x="56" y="113" text-anchor="middle" class="badge">✗</text>
  <text x="80" y="113" class="text" font-weight="700" fill="#dc2626">Khong co Validation:</text>

  <!-- Client Bad -->
  <rect x="60" y="135" width="180" height="100" rx="14" fill="#f97316"/>
  <text x="150" y="172" text-anchor="middle" class="label">Client</text>
  <text x="150" y="195" text-anchor="middle" class="sublabel">name: ""</text>
  <text x="150" y="212" text-anchor="middle" class="sublabel">email: "not-email"</text>

  <!-- Arrow -->
  <line x1="250" y1="185" x2="340" y2="185" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="295" y="177" text-anchor="middle" class="arrow-label" fill="#ef4444">Du lieu sai</text>

  <!-- Controller Bad -->
  <rect x="350" y="135" width="200" height="100" rx="14" fill="#94a3b8"/>
  <text x="450" y="172" text-anchor="middle" class="label">Controller</text>
  <text x="450" y="195" text-anchor="middle" class="sublabel">Khong kiem tra</text>
  <text x="450" y="212" text-anchor="middle" class="sublabel">→ Cho qua het!</text>

  <!-- Arrow -->
  <line x1="560" y1="185" x2="650" y2="185" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>

  <!-- Service Bad -->
  <rect x="660" y="135" width="200" height="100" rx="14" fill="#94a3b8"/>
  <text x="760" y="172" text-anchor="middle" class="label">Service</text>
  <text x="760" y="195" text-anchor="middle" class="sublabel">Xu ly du lieu rac</text>

  <!-- Arrow -->
  <line x1="870" y1="185" x2="960" y2="185" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>

  <!-- Database Bad -->
  <rect x="970" y="135" width="180" height="100" rx="14" fill="#ef4444"/>
  <text x="1060" y="172" text-anchor="middle" class="label">Database</text>
  <text x="1060" y="195" text-anchor="middle" class="sublabel">Luu du lieu rac!</text>
  <text x="1060" y="212" text-anchor="middle" class="sublabel">SQL Injection!</text>

  <!-- === ROW 2: With Validation (GOOD) === -->
  <rect x="30" y="280" width="1140" height="210" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <rect x="42" y="288" width="28" height="28" rx="14" fill="#16a34a"/>
  <text x="56" y="308" text-anchor="middle" class="badge">✓</text>
  <text x="80" y="308" class="text" font-weight="700" fill="#16a34a">Co Validation (Bean Validation + @Valid):</text>

  <!-- Client Good -->
  <rect x="60" y="335" width="180" height="100" rx="14" fill="#f97316"/>
  <text x="150" y="372" text-anchor="middle" class="label">Client</text>
  <text x="150" y="395" text-anchor="middle" class="sublabel">name: ""</text>
  <text x="150" y="412" text-anchor="middle" class="sublabel">email: "not-email"</text>

  <!-- Arrow -->
  <line x1="250" y1="385" x2="340" y2="385" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="295" y="377" text-anchor="middle" class="arrow-label" fill="#3b82f6">Request</text>

  <!-- Controller Good - Validation -->
  <rect x="350" y="325" width="200" height="120" rx="14" fill="#16a34a"/>
  <text x="450" y="362" text-anchor="middle" class="label">Controller</text>
  <text x="450" y="385" text-anchor="middle" class="sublabel">@Valid kiem tra</text>
  <text x="450" y="402" text-anchor="middle" class="sublabel">@NotBlank, @Email</text>
  <text x="450" y="419" text-anchor="middle" class="sublabel">@Min, @Size...</text>

  <!-- Validation Shield icon -->
  <rect x="390" y="328" width="18" height="18" rx="9" fill="#fff"/>
  <text x="399" y="342" text-anchor="middle" font-size="12" fill="#16a34a">🛡</text>

  <!-- Arrow to error response -->
  <line x1="450" y1="455" x2="450" y2="480" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="355" y="460" width="190" height="26" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="478" text-anchor="middle" class="mono" fill="#dc2626">400 Bad Request + chi tiet</text>

  <!-- Arrow to Service (validation pass) -->
  <line x1="560" y1="385" x2="650" y2="385" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="605" y="377" text-anchor="middle" class="arrow-label" fill="#16a34a">PASS</text>

  <!-- Service Good -->
  <rect x="660" y="335" width="200" height="100" rx="14" fill="#3b82f6"/>
  <text x="760" y="372" text-anchor="middle" class="label">Service</text>
  <text x="760" y="395" text-anchor="middle" class="sublabel">Du lieu da sach!</text>
  <text x="760" y="412" text-anchor="middle" class="sublabel">Xu ly an toan</text>

  <!-- Arrow -->
  <line x1="870" y1="385" x2="960" y2="385" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Database Good -->
  <rect x="970" y="335" width="180" height="100" rx="14" fill="#0ea5e9"/>
  <text x="1060" y="372" text-anchor="middle" class="label">Database</text>
  <text x="1060" y="395" text-anchor="middle" class="sublabel">Du lieu hop le</text>
  <text x="1060" y="412" text-anchor="middle" class="sublabel">An toan, nhat quan</text>
</svg>
