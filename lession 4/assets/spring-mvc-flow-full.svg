<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrF" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6db33f"/>
    </marker>
  </defs>
  <rect width="800" height="350" fill="url(#bgF)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Luồng Request: Controller → Service → Repository → Database</text>
  <!-- Client -->
  <rect x="20" y="120" width="100" height="80" rx="10" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="70" y="155" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Client</text>
  <text x="70" y="175" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">Postman/FE</text>
  <!-- Arrow -->
  <line x1="120" y1="150" x2="155" y2="150" stroke="#e94560" stroke-width="2" marker-end="url(#arrF)"/>
  <text x="140" y="142" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">HTTP</text>
  <!-- Controller -->
  <rect x="160" y="90" width="130" height="140" rx="10" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1.5"/>
  <text x="225" y="115" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Controller</text>
  <text x="225" y="135" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="9">@RestController</text>
  <text x="225" y="155" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Nhận request</text>
  <text x="225" y="170" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Validate input</text>
  <text x="225" y="185" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Gọi Service</text>
  <text x="225" y="200" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Trả response</text>
  <!-- Arrow -->
  <line x1="290" y1="160" x2="325" y2="160" stroke="#e94560" stroke-width="2" marker-end="url(#arrF)"/>
  <!-- Service -->
  <rect x="330" y="90" width="130" height="140" rx="10" fill="#6db33f" opacity="0.2" stroke="#6db33f" stroke-width="1.5"/>
  <text x="395" y="115" text-anchor="middle" fill="#6db33f" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Service</text>
  <text x="395" y="135" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="9">@Service</text>
  <text x="395" y="155" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Business logic</text>
  <text x="395" y="170" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Xử lý nghiệp vụ</text>
  <text x="395" y="185" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Gọi Repository</text>
  <text x="395" y="200" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Throw Exception</text>
  <!-- Arrow -->
  <line x1="460" y1="160" x2="495" y2="160" stroke="#e94560" stroke-width="2" marker-end="url(#arrF)"/>
  <!-- Repository -->
  <rect x="500" y="90" width="130" height="140" rx="10" fill="#533483" opacity="0.2" stroke="#b39ddb" stroke-width="1.5"/>
  <text x="565" y="115" text-anchor="middle" fill="#b39ddb" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Repository</text>
  <text x="565" y="135" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="9">@Repository</text>
  <text x="565" y="155" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• CRUD operations</text>
  <text x="565" y="170" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• JpaRepository</text>
  <text x="565" y="185" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Query methods</text>
  <text x="565" y="200" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">• Custom queries</text>
  <!-- Arrow -->
  <line x1="630" y1="160" x2="665" y2="160" stroke="#e94560" stroke-width="2" marker-end="url(#arrF)"/>
  <!-- Database -->
  <rect x="670" y="120" width="110" height="80" rx="10" fill="#0f3460" stroke="#5dade2" stroke-width="1.5"/>
  <text x="725" y="152" text-anchor="middle" fill="#5dade2" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Database</text>
  <text x="725" y="172" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8">MySQL/PostgreSQL</text>
  <!-- Return arrow -->
  <line x1="670" y1="200" x2="120" y2="200" stroke="#6db33f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <text x="400" y="220" text-anchor="middle" fill="#6db33f" font-family="Arial,sans-serif" font-size="9">← Response (JSON)</text>
  <!-- Annotations -->
  <text x="225" y="265" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="10">@GetMapping</text>
  <text x="225" y="280" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="10">@PostMapping</text>
  <text x="395" y="265" text-anchor="middle" fill="#6db33f" font-family="Arial,sans-serif" font-size="10">@Transactional</text>
  <text x="395" y="280" text-anchor="middle" fill="#6db33f" font-family="Arial,sans-serif" font-size="10">Business Rules</text>
  <text x="565" y="265" text-anchor="middle" fill="#b39ddb" font-family="Arial,sans-serif" font-size="10">JpaRepository</text>
  <text x="565" y="280" text-anchor="middle" fill="#b39ddb" font-family="Arial,sans-serif" font-size="10">findBy...()</text>
  <!-- Rule -->
  <rect x="100" y="305" width="600" height="30" rx="5" fill="#e94560" opacity="0.1" stroke="#e94560" stroke-width="0.5"/>
  <text x="400" y="325" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="10">Quy tắc: Controller KHÔNG chứa logic → Service KHÔNG truy cập DB trực tiếp → Repository KHÔNG chứa logic</text>
</svg>
