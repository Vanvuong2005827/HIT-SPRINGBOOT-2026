<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tomcat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="spring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6db33f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a9e2f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="client" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a2647;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Embedded Tomcat trong Spring Boot</text>
  <!-- Client -->
  <rect x="30" y="140" width="130" height="120" rx="10" fill="url(#client)" stroke="#533483" stroke-width="2"/>
  <text x="95" y="185" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Client</text>
  <text x="95" y="205" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Browser / Postman</text>
  <text x="95" y="220" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Mobile App</text>
  <!-- Arrow -->
  <line x1="160" y1="200" x2="210" y2="200" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="185" y="190" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="9">HTTP</text>
  <!-- Tomcat Container -->
  <rect x="210" y="60" width="560" height="300" rx="12" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="490" y="85" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="14" font-weight="bold">Embedded Tomcat (port 8080)</text>
  <!-- Connector -->
  <rect x="230" y="120" width="120" height="70" rx="8" fill="url(#tomcat)" opacity="0.9"/>
  <text x="290" y="152" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Connector</text>
  <text x="290" y="170" text-anchor="middle" fill="#ffd" font-family="Arial,sans-serif" font-size="9">HTTP/1.1 :8080</text>
  <!-- Arrow -->
  <line x1="350" y1="155" x2="380" y2="155" stroke="#fff" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <!-- DispatcherServlet -->
  <rect x="380" y="110" width="160" height="90" rx="8" fill="url(#spring)" opacity="0.9"/>
  <text x="460" y="145" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="bold">DispatcherServlet</text>
  <text x="460" y="163" text-anchor="middle" fill="#e0ffe0" font-family="Arial,sans-serif" font-size="9">Front Controller</text>
  <text x="460" y="180" text-anchor="middle" fill="#e0ffe0" font-family="Arial,sans-serif" font-size="9">Route → Controller</text>
  <!-- Arrow down -->
  <line x1="460" y1="200" x2="460" y2="240" stroke="#fff" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <!-- Controller -->
  <rect x="380" y="240" width="160" height="60" rx="8" fill="url(#spring)" opacity="0.7"/>
  <text x="460" y="268" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="bold">@RestController</text>
  <text x="460" y="286" text-anchor="middle" fill="#e0ffe0" font-family="Arial,sans-serif" font-size="9">Business Logic</text>
  <!-- Thread Pool -->
  <rect x="600" y="120" width="150" height="70" rx="8" fill="url(#tomcat)" opacity="0.7"/>
  <text x="675" y="148" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Thread Pool</text>
  <text x="675" y="168" text-anchor="middle" fill="#ffd" font-family="Arial,sans-serif" font-size="9">200 threads (default)</text>
  <!-- Servlet Container -->
  <rect x="600" y="240" width="150" height="60" rx="8" fill="url(#client)" opacity="0.8"/>
  <text x="675" y="265" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Servlet Container</text>
  <text x="675" y="282" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="9">Filter Chain</text>
  <!-- Legend -->
  <rect x="230" y="330" width="12" height="12" rx="2" fill="#e94560"/>
  <text x="248" y="341" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Tomcat Components</text>
  <rect x="400" y="330" width="12" height="12" rx="2" fill="#6db33f"/>
  <text x="418" y="341" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Spring Components</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
  </defs>
</svg>
