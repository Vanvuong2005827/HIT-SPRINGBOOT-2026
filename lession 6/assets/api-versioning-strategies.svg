<svg viewBox="0 0 820 350" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="820" height="350" fill="url(#bg5)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">API Versioning — 3 Chien Luoc</text>

  <!-- Strategy 1: URL Path -->
  <rect x="20" y="60" width="250" height="260" rx="8" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="145" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">URL Path Versioning</text>
  <text x="145" y="105" text-anchor="middle" font-size="11" fill="#ffd54f">Pho bien nhat</text>

  <text x="35" y="130" font-size="11" fill="#90caf9">/api/v1/users</text>
  <text x="35" y="150" font-size="11" fill="#90caf9">/api/v2/users</text>

  <text x="35" y="180" font-size="10.5" font-weight="bold" fill="#81c784">Uu diem:</text>
  <text x="35" y="197" font-size="10" fill="#b2dfdb">  Don gian, truc quan</text>
  <text x="35" y="214" font-size="10" fill="#b2dfdb">  De test tren browser</text>
  <text x="35" y="231" font-size="10" fill="#b2dfdb">  Ho tro tot boi CDN/proxy</text>

  <text x="35" y="255" font-size="10.5" font-weight="bold" fill="#ef9a9a">Nhuoc diem:</text>
  <text x="35" y="272" font-size="10" fill="#ef9a9a">  URL dai hon</text>
  <text x="35" y="289" font-size="10" fill="#ef9a9a">  Vi pham REST thuan tuy</text>

  <!-- Strategy 2: Header -->
  <rect x="285" y="60" width="250" height="260" rx="8" fill="#00695c" stroke="#4db6ac" stroke-width="1.5"/>
  <text x="410" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Custom Header</text>
  <text x="410" y="105" text-anchor="middle" font-size="11" fill="#b2dfdb">Phu hop enterprise</text>

  <text x="300" y="130" font-size="11" fill="#b2dfdb">GET /api/users</text>
  <text x="300" y="150" font-size="11" fill="#b2dfdb">X-API-Version: 1</text>

  <text x="300" y="180" font-size="10.5" font-weight="bold" fill="#81c784">Uu diem:</text>
  <text x="300" y="197" font-size="10" fill="#b2dfdb">  URL sach, khong doi</text>
  <text x="300" y="214" font-size="10" fill="#b2dfdb">  Linh hoat</text>

  <text x="300" y="240" font-size="10.5" font-weight="bold" fill="#ef9a9a">Nhuoc diem:</text>
  <text x="300" y="257" font-size="10" fill="#ef9a9a">  Client phai set header</text>
  <text x="300" y="274" font-size="10" fill="#ef9a9a">  Kho test tren browser</text>
  <text x="300" y="291" font-size="10" fill="#ef9a9a">  De quen version header</text>

  <!-- Strategy 3: Query Param -->
  <rect x="550" y="60" width="250" height="260" rx="8" fill="#e65100" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="675" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Query Parameter</text>
  <text x="675" y="105" text-anchor="middle" font-size="11" fill="#ffe0b2">It dung</text>

  <text x="565" y="130" font-size="11" fill="#ffe0b2">/api/users?version=1</text>
  <text x="565" y="150" font-size="11" fill="#ffe0b2">/api/users?version=2</text>

  <text x="565" y="180" font-size="10.5" font-weight="bold" fill="#81c784">Uu diem:</text>
  <text x="565" y="197" font-size="10" fill="#b2dfdb">  De implement</text>
  <text x="565" y="214" font-size="10" fill="#b2dfdb">  Optional version</text>

  <text x="565" y="240" font-size="10.5" font-weight="bold" fill="#ef9a9a">Nhuoc diem:</text>
  <text x="565" y="257" font-size="10" fill="#ef9a9a">  De bi bo qua</text>
  <text x="565" y="274" font-size="10" fill="#ef9a9a">  Lan voi filter params</text>
  <text x="565" y="291" font-size="10" fill="#ef9a9a">  Kho quan ly routing</text>

  <text x="410" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd54f">Khuyen nghi: URL Path Versioning (/api/v1/...) — don gian, ro rang, phu hop hau het du an</text>
</svg>
