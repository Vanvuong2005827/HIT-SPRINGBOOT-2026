<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <marker id="arrS" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#90caf9"/>
    </marker>
  </defs>
  <rect width="820" height="460" fill="url(#bgS)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">JPA Specification — Dynamic Query Builder</text>

  <!-- Problem: Method Explosion -->
  <rect x="20" y="55" width="380" height="175" rx="8" fill="#b71c1c" stroke="#ef5350" stroke-width="1.5" opacity="0.9"/>
  <text x="210" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Van de: Bung no method</text>
  <text x="40" y="100" font-size="10.5" fill="#ffcdd2">findByCategory(...)</text>
  <text x="40" y="117" font-size="10.5" fill="#ffcdd2">findByActive(...)</text>
  <text x="40" y="134" font-size="10.5" fill="#ffcdd2">findByCategoryAndActive(...)</text>
  <text x="40" y="151" font-size="10.5" fill="#ffcdd2">findByNameContainingAndCategory(...)</text>
  <text x="40" y="168" font-size="10.5" fill="#ffcdd2">findByNameAndCategoryAndActive(...)</text>
  <text x="40" y="185" font-size="10.5" fill="#ef9a9a">findByNameAndCategoryAndActiveAndPrice...</text>
  <text x="40" y="205" font-size="10.5" fill="#ffd54f">2 filter → 4 methods | 5 filter → 32 methods</text>
  <text x="40" y="220" font-size="10.5" fill="#ffd54f">→ Bung no cap so nhan!</text>

  <!-- Solution: Specification -->
  <rect x="420" y="55" width="380" height="175" rx="8" fill="#1b5e20" stroke="#66bb6a" stroke-width="1.5" opacity="0.9"/>
  <text x="610" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Giai phap: Specification</text>
  <text x="440" y="100" font-size="10.5" fill="#c8e6c9">hasCategory(cat)</text>
  <text x="440" y="117" font-size="10.5" fill="#c8e6c9">isActive(active)</text>
  <text x="440" y="134" font-size="10.5" fill="#c8e6c9">nameContains(keyword)</text>
  <text x="440" y="151" font-size="10.5" fill="#c8e6c9">priceBetween(min, max)</text>
  <text x="440" y="176" font-size="10.5" fill="#81c784">To hop linh hoat tai runtime:</text>
  <text x="440" y="193" font-size="10.5" fill="#ffd54f">where(name).and(cat).and(active)</text>
  <text x="440" y="210" font-size="10.5" fill="#ffd54f">→ 0 method khai bao trong Repository</text>
  <text x="440" y="225" font-size="10.5" fill="#ffd54f">→ Scale vo han filter!</text>

  <!-- Arrow Problem to Solution -->
  <line x1="400" y1="142" x2="420" y2="142" stroke="#ffd54f" stroke-width="3" marker-end="url(#arrS)"/>

  <!-- How it works -->
  <rect x="20" y="250" width="780" height="195" rx="8" fill="#ffffff0a" stroke="#ffffff22" stroke-width="1"/>
  <text x="410" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffd54f">Specification Flow</text>

  <!-- Step 1: Filter Specs -->
  <rect x="40" y="295" width="155" height="70" rx="6" fill="#7b1fa2" stroke="#ce93d8" stroke-width="1"/>
  <text x="118" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Filter Specs</text>
  <text x="55" y="333" font-size="9.5" fill="#e1bee7">hasCategory(BOOK)</text>
  <text x="55" y="348" font-size="9.5" fill="#e1bee7">nameContains("spring")</text>
  <text x="55" y="363" font-size="9.5" fill="#e1bee7">isActive(true)</text>

  <line x1="195" y1="330" x2="230" y2="330" stroke="#90caf9" stroke-width="2" marker-end="url(#arrS)"/>

  <!-- Step 2: Combine -->
  <rect x="235" y="295" width="155" height="70" rx="6" fill="#e65100" stroke="#ffb74d" stroke-width="1"/>
  <text x="313" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">To Hop</text>
  <text x="250" y="333" font-size="9.5" fill="#ffe0b2">Specification.where()</text>
  <text x="250" y="348" font-size="9.5" fill="#ffe0b2">  .and(hasCategory)</text>
  <text x="250" y="363" font-size="9.5" fill="#ffe0b2">  .and(nameContains)</text>

  <line x1="390" y1="330" x2="425" y2="330" stroke="#90caf9" stroke-width="2" marker-end="url(#arrS)"/>

  <!-- Step 3: Repository -->
  <rect x="430" y="295" width="155" height="70" rx="6" fill="#0d47a1" stroke="#42a5f5" stroke-width="1"/>
  <text x="508" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Repository</text>
  <text x="445" y="333" font-size="9.5" fill="#bbdefb">JpaSpecification</text>
  <text x="445" y="348" font-size="9.5" fill="#bbdefb">  Executor</text>
  <text x="445" y="363" font-size="9.5" fill="#bbdefb">findAll(spec, pageable)</text>

  <line x1="585" y1="330" x2="620" y2="330" stroke="#90caf9" stroke-width="2" marker-end="url(#arrS)"/>

  <!-- Step 4: Generated SQL -->
  <rect x="625" y="295" width="155" height="70" rx="6" fill="#37474f" stroke="#78909c" stroke-width="1"/>
  <text x="703" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Generated SQL</text>
  <text x="640" y="333" font-size="9" fill="#b0bec5">WHERE cat = 'BOOK'</text>
  <text x="640" y="348" font-size="9" fill="#b0bec5">AND name LIKE '%spring%'</text>
  <text x="640" y="363" font-size="9" fill="#b0bec5">AND active = true</text>

  <!-- Bottom note -->
  <text x="410" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#81c784">Moi filter = 1 static method | Return null = bo qua condition</text>
  <text x="410" y="430" text-anchor="middle" font-size="11" fill="#78909c">Repository chi can: extends JpaSpecificationExecutor&lt;Product&gt; — khong khai bao method nao</text>
</svg>
