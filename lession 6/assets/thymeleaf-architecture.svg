<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <marker id="arr7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#90caf9"/>
    </marker>
  </defs>
  <rect width="820" height="400" fill="url(#bg7)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">Thymeleaf — Server-Side Rendering Architecture</text>

  <!-- Client -->
  <rect x="20" y="70" width="150" height="50" rx="6" fill="#7b1fa2" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="95" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Browser</text>

  <line x1="170" y1="95" x2="230" y2="95" stroke="#90caf9" stroke-width="2" marker-end="url(#arr7)"/>
  <text x="200" y="86" text-anchor="middle" font-size="9" fill="#90caf9">GET /users</text>

  <!-- Controller -->
  <rect x="235" y="60" width="170" height="70" rx="6" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="320" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">@Controller</text>
  <text x="320" y="104" text-anchor="middle" font-size="10" fill="#90caf9">Model.addAttribute()</text>
  <text x="320" y="118" text-anchor="middle" font-size="10" fill="#90caf9">return "users/list"</text>

  <line x1="405" y1="95" x2="460" y2="95" stroke="#90caf9" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Thymeleaf Engine -->
  <rect x="465" y="55" width="180" height="80" rx="6" fill="#00695c" stroke="#4db6ac" stroke-width="1.5"/>
  <text x="555" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Thymeleaf Engine</text>
  <text x="555" y="100" text-anchor="middle" font-size="10" fill="#b2dfdb">Template (.html)</text>
  <text x="555" y="115" text-anchor="middle" font-size="10" fill="#b2dfdb">+ Model data</text>
  <text x="555" y="128" text-anchor="middle" font-size="10" fill="#b2dfdb">= Final HTML</text>

  <line x1="645" y1="95" x2="700" y2="95" stroke="#90caf9" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- HTML Output -->
  <rect x="705" y="70" width="100" height="50" rx="6" fill="#e65100" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="755" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">HTML</text>

  <!-- SSR vs CSR comparison -->
  <rect x="20" y="170" width="380" height="200" rx="8" fill="#ffffff0a" stroke="#4db6ac" stroke-width="1"/>
  <text x="210" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#4db6ac">SSR — Server-Side Rendering</text>
  <text x="210" y="212" text-anchor="middle" font-size="11" fill="#b2dfdb">(Thymeleaf, JSP, Freemarker)</text>

  <text x="35" y="237" font-size="10.5" fill="#b2dfdb">Server render HTML hoan chinh</text>
  <text x="35" y="254" font-size="10.5" fill="#b2dfdb">Browser nhan HTML → hien thi ngay</text>
  <text x="35" y="271" font-size="10.5" fill="#b2dfdb">SEO tot (search engine doc duoc)</text>
  <text x="35" y="288" font-size="10.5" fill="#b2dfdb">Phu hop: trang admin, dashboard noi bo</text>
  <text x="35" y="305" font-size="10.5" fill="#b2dfdb">Backend va Frontend cung 1 project</text>
  <text x="35" y="328" font-size="10.5" fill="#ffa726">Dung @Controller (khong phai @RestController)</text>
  <text x="35" y="348" font-size="10.5" fill="#ffa726">Return String = ten template (.html)</text>

  <rect x="420" y="170" width="380" height="200" rx="8" fill="#ffffff0a" stroke="#42a5f5" stroke-width="1"/>
  <text x="610" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#42a5f5">CSR — Client-Side Rendering</text>
  <text x="610" y="212" text-anchor="middle" font-size="11" fill="#90caf9">(React, Vue, Angular + REST API)</text>

  <text x="435" y="237" font-size="10.5" fill="#90caf9">Server tra JSON data qua REST API</text>
  <text x="435" y="254" font-size="10.5" fill="#90caf9">Browser nhan JSON → JS render HTML</text>
  <text x="435" y="271" font-size="10.5" fill="#90caf9">UX muot hon (SPA, khong reload page)</text>
  <text x="435" y="288" font-size="10.5" fill="#90caf9">Phu hop: ung dung phuc tap, mobile</text>
  <text x="435" y="305" font-size="10.5" fill="#90caf9">Frontend va Backend tach rieng</text>
  <text x="435" y="328" font-size="10.5" fill="#ffa726">Dung @RestController</text>
  <text x="435" y="348" font-size="10.5" fill="#ffa726">Return data (JSON/XML)</text>

  <text x="410" y="390" text-anchor="middle" font-size="11" fill="#78909c">Buoi nay hoc ca 2: @Controller + Thymeleaf (SSR) va @RestController + JSON (CSR/REST API)</text>
</svg>
