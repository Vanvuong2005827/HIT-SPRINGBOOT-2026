<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#90caf9"/>
    </marker>
  </defs>
  <rect width="820" height="400" fill="url(#bg4)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">DTO Mapping Flow — Request va Response</text>

  <!-- Client -->
  <rect x="320" y="55" width="180" height="40" rx="6" fill="#7b1fa2" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="410" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Client (JSON)</text>

  <!-- Arrow down left -->
  <line x1="360" y1="95" x2="200" y2="135" stroke="#81c784" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="260" y="110" text-anchor="middle" font-size="10" fill="#81c784">Request JSON</text>

  <!-- Arrow down right -->
  <line x1="460" y1="95" x2="620" y2="135" stroke="#64b5f6" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="560" y="110" text-anchor="middle" font-size="10" fill="#64b5f6">Response JSON</text>

  <!-- Request DTO -->
  <rect x="80" y="138" width="240" height="100" rx="8" fill="#1b5e20" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="200" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Request DTO</text>
  <text x="95" y="182" font-size="10.5" fill="#c8e6c9">CreateUserRequest</text>
  <text x="95" y="198" font-size="10.5" fill="#c8e6c9">  name, email, phone</text>
  <text x="95" y="214" font-size="10.5" fill="#c8e6c9">  @NotBlank, @Email...</text>
  <text x="95" y="230" font-size="10.5" fill="#a5d6a7">Chi chua field client gui</text>

  <!-- Response DTO -->
  <rect x="500" y="138" width="240" height="100" rx="8" fill="#0d47a1" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="620" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Response DTO</text>
  <text x="515" y="182" font-size="10.5" fill="#bbdefb">UserResponse</text>
  <text x="515" y="198" font-size="10.5" fill="#bbdefb">  id, name, email, active</text>
  <text x="515" y="214" font-size="10.5" fill="#bbdefb">  createdAt</text>
  <text x="515" y="230" font-size="10.5" fill="#90caf9">An thong tin nhay cam</text>

  <!-- Arrow to Entity -->
  <line x1="200" y1="238" x2="350" y2="278" stroke="#ffa726" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="250" y="260" text-anchor="middle" font-size="10" fill="#ffa726">Mapper</text>

  <!-- Entity -->
  <rect x="310" y="275" width="200" height="55" rx="8" fill="#e65100" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="410" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Entity (JPA)</text>
  <text x="410" y="318" text-anchor="middle" font-size="10.5" fill="#ffe0b2">id, name, email, password, role...</text>

  <!-- Arrow from Entity -->
  <line x1="470" y1="278" x2="620" y2="238" stroke="#ffa726" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="570" y="260" text-anchor="middle" font-size="10" fill="#ffa726">Mapper</text>

  <!-- Bottom info -->
  <rect x="20" y="345" width="780" height="45" rx="8" fill="#ffffff0a" stroke="#ffffff22" stroke-width="1"/>
  <text x="410" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd54f">Request DTO (input) → Entity (DB) → Response DTO (output)</text>
  <text x="410" y="382" text-anchor="middle" font-size="10.5" fill="#78909c">Entity KHONG BAO GIO tra truc tiep qua API — luon convert qua DTO</text>
</svg>
