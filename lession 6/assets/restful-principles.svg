<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="820" height="420" fill="url(#bg1)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">6 Nguyên Tắc RESTful API</text>

  <!-- Row 1 -->
  <rect x="20" y="55" width="250" height="95" rx="8" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="145" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">1. Resource-Oriented</text>
  <text x="35" y="98" font-size="10.5" fill="#90caf9">URL = danh từ, đại diện cho tài nguyên</text>
  <text x="35" y="115" font-size="10.5" fill="#81c784">/api/users, /api/orders</text>
  <text x="35" y="132" font-size="10.5" fill="#ef9a9a">/api/getUser, /api/deleteUser</text>

  <rect x="285" y="55" width="250" height="95" rx="8" fill="#00695c" stroke="#4db6ac" stroke-width="1.5"/>
  <text x="410" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">2. HTTP Methods</text>
  <text x="300" y="98" font-size="10.5" fill="#b2dfdb">GET = Read    POST = Create</text>
  <text x="300" y="115" font-size="10.5" fill="#b2dfdb">PUT = Replace PATCH = Partial</text>
  <text x="300" y="132" font-size="10.5" fill="#b2dfdb">DELETE = Remove</text>

  <rect x="550" y="55" width="250" height="95" rx="8" fill="#e65100" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="675" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">3. Status Code</text>
  <text x="565" y="98" font-size="10.5" fill="#ffe0b2">200 OK, 201 Created, 204 No Content</text>
  <text x="565" y="115" font-size="10.5" fill="#ffe0b2">400 Bad Request, 404 Not Found</text>
  <text x="565" y="132" font-size="10.5" fill="#ffe0b2">409 Conflict, 500 Server Error</text>

  <!-- Row 2 -->
  <rect x="20" y="170" width="250" height="95" rx="8" fill="#7b1fa2" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="145" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">4. Stateless</text>
  <text x="35" y="213" font-size="10.5" fill="#e1bee7">Server KHÔNG lưu session client</text>
  <text x="35" y="230" font-size="10.5" fill="#e1bee7">Mỗi request mang đủ thông tin</text>
  <text x="35" y="247" font-size="10.5" fill="#e1bee7">Auth qua JWT/Token trong Header</text>

  <rect x="285" y="170" width="250" height="95" rx="8" fill="#37474f" stroke="#78909c" stroke-width="1.5"/>
  <text x="410" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">5. Naming Convention</text>
  <text x="300" y="213" font-size="10.5" fill="#b0bec5">Danh tu so nhieu: /users, /orders</text>
  <text x="300" y="230" font-size="10.5" fill="#b0bec5">Nested: /users/{id}/orders</text>
  <text x="300" y="247" font-size="10.5" fill="#b0bec5">kebab-case: /order-items</text>

  <rect x="550" y="170" width="250" height="95" rx="8" fill="#bf360c" stroke="#ff8a65" stroke-width="1.5"/>
  <text x="675" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">6. Versioning</text>
  <text x="565" y="213" font-size="10.5" fill="#ffccbc">URL: /api/v1/users</text>
  <text x="565" y="230" font-size="10.5" fill="#ffccbc">Header: X-API-Version: 1</text>
  <text x="565" y="247" font-size="10.5" fill="#ffccbc">Query: /api/users?version=1</text>

  <!-- Bottom summary -->
  <rect x="20" y="285" width="780" height="120" rx="8" fill="#ffffff0a" stroke="#ffffff22" stroke-width="1"/>
  <text x="410" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffd54f">REST = Representational State Transfer</text>
  <text x="410" y="330" text-anchor="middle" font-size="11" fill="#90caf9">Client giao tiep voi Server qua HTTP, moi request doc lap (stateless)</text>
  <text x="410" y="350" text-anchor="middle" font-size="11" fill="#90caf9">URL dai dien cho tai nguyen (resource), HTTP method xac dinh hanh dong</text>
  <text x="410" y="370" text-anchor="middle" font-size="11" fill="#90caf9">Response tra ve kem Status Code chuan + Body (JSON/XML)</text>
  <text x="410" y="390" text-anchor="middle" font-size="11" fill="#90caf9">API duoc version hoa de dam bao backward compatibility</text>
</svg>
