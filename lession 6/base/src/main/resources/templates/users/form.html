<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo User Mới</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{layout/base :: header}"></div>

    <main>
        <h1>Tạo User Mới</h1>

        <!-- Thông báo lỗi -->
        <div th:if="${errorMessage}" class="alert-error">
            <p th:text="${errorMessage}"></p>
        </div>

        <!-- Form -->
        <form th:action="@{/users}" th:object="${userForm}" method="post" class="form-container">

            <div class="form-group">
                <label for="name">Tên <span class="required">*</span></label>
                <input type="text" id="name" th:field="*{name}" placeholder="Nguyễn Văn A">
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></span>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" th:field="*{email}" placeholder="example@gmail.com">
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Số điện thoại</label>
                <input type="text" id="phoneNumber" th:field="*{phoneNumber}" placeholder="0912345678">
                <span th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="error"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Tạo User</button>
                <a th:href="@{/users}" class="btn-secondary">Hủy</a>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <div th:replace="~{layout/base :: footer}"></div>
</body>
</html>
