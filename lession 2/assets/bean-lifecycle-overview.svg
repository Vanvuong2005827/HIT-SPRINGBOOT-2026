<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Spring Bean Lifecycle</title>
  <desc id="desc">Lifecycle stages of a Spring Bean from instantiation to destruction.</desc>

  <defs>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .step { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .detail { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="down" markerWidth="12" markerHeight="12" refX="6" refY="10" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,0 L6,12 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" class="title">Spring Bean Lifecycle</text>

  <rect x="250" y="95" width="700" height="64" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="600" y="132" text-anchor="middle" class="step">1. Instantiation (Constructor)</text>

  <line x1="600" y1="160" x2="600" y2="188" stroke="#64748b" stroke-width="3" marker-end="url(#down)"/>

  <rect x="250" y="195" width="700" height="64" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="600" y="232" text-anchor="middle" class="step">2. Dependency Injection (@Autowired)</text>

  <line x1="600" y1="260" x2="600" y2="288" stroke="#64748b" stroke-width="3" marker-end="url(#down)"/>

  <rect x="250" y="295" width="700" height="64" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="600" y="332" text-anchor="middle" class="step">3. Aware Interfaces</text>

  <line x1="600" y1="360" x2="600" y2="388" stroke="#64748b" stroke-width="3" marker-end="url(#down)"/>

  <rect x="250" y="395" width="700" height="64" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="600" y="432" text-anchor="middle" class="step">4. Initialization (@PostConstruct / afterPropertiesSet)</text>

  <line x1="600" y1="460" x2="600" y2="488" stroke="#64748b" stroke-width="3" marker-end="url(#down)"/>

  <rect x="250" y="495" width="700" height="64" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="600" y="532" text-anchor="middle" class="step">5. Bean Ready (Business Use)</text>

  <line x1="600" y1="560" x2="600" y2="588" stroke="#64748b" stroke-width="3" marker-end="url(#down)"/>

  <rect x="250" y="595" width="700" height="64" rx="12" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="600" y="632" text-anchor="middle" class="step">6. Destruction (@PreDestroy / destroy)</text>

  <text x="600" y="704" text-anchor="middle" class="detail">Use @PostConstruct for init and @PreDestroy for cleanup tasks.</text>
</svg>
