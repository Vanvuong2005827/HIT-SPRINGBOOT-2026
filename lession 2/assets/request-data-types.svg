<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Three Types of Request Data</title>
  <desc id="desc">Path variable, query parameter, and request body in an HTTP request.</desc>

  <defs>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 21px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .url { font: 600 22px 'Consolas', 'Courier New', monospace; fill: #111827; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .code { font: 500 19px 'Consolas', 'Courier New', monospace; fill: #1e293b; }
    </style>
  </defs>

  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="600" y="55" text-anchor="middle" class="title">3 Types of Data from Client</text>
  <text x="600" y="90" text-anchor="middle" class="subtitle">Path Variable, Query Param, Request Body</text>

  <rect x="70" y="120" width="1060" height="84" rx="14" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="100" y="172" class="url">GET /api/users/42?sort=name&amp;order=asc</text>

  <rect x="190" y="238" width="280" height="260" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="330" y="288" text-anchor="middle" class="label">@PathVariable</text>
  <text x="330" y="328" text-anchor="middle" class="text">Data in URL path</text>
  <text x="330" y="365" text-anchor="middle" class="code">/users/{id}</text>
  <text x="330" y="400" text-anchor="middle" class="code">id = 42</text>

  <rect x="500" y="238" width="280" height="260" rx="16" fill="#dcfce7" stroke="#86efac"/>
  <text x="640" y="288" text-anchor="middle" class="label">@RequestParam</text>
  <text x="640" y="328" text-anchor="middle" class="text">Data in query string</text>
  <text x="640" y="365" text-anchor="middle" class="code">?sort=name&amp;order=asc</text>
  <text x="640" y="400" text-anchor="middle" class="code">sort, order</text>

  <rect x="810" y="238" width="280" height="260" rx="16" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="950" y="288" text-anchor="middle" class="label">@RequestBody</text>
  <text x="950" y="328" text-anchor="middle" class="text">Data in JSON body</text>
  <text x="950" y="365" text-anchor="middle" class="code">{"name":"HIT"}</text>
  <text x="950" y="400" text-anchor="middle" class="code">Create/Update data</text>

  <line x1="330" y1="205" x2="330" y2="236" stroke="#64748b" stroke-width="3"/>
  <line x1="640" y1="205" x2="640" y2="236" stroke="#64748b" stroke-width="3"/>
  <line x1="950" y1="205" x2="950" y2="236" stroke="#64748b" stroke-width="3"/>
</svg>
