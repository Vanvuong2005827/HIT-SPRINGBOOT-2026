<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">HTTP Request Mapping Mechanisms</title>
  <desc id="desc">Spring MVC mapping split into WebDataBinder for path/query/form fields and HttpMessageConverter for request body deserialization.</desc>

  <defs>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .req { font: 600 22px 'Consolas', 'Courier New', monospace; fill: #111827; }
      .groupTitle { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .groupSub { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .code { font: 500 18px 'Consolas', 'Courier New', monospace; fill: #1e293b; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="58" text-anchor="middle" class="title">HTTP Request Mapping in Spring MVC</text>
  <text x="600" y="92" text-anchor="middle" class="subtitle">Web Data Binding vs Request Body Deserialization</text>

  <rect x="70" y="126" width="1060" height="72" rx="14" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="98" y="171" class="req">GET /api/users/42?sort=name&amp;order=asc</text>

  <rect x="70" y="212" width="1060" height="72" rx="14" fill="#fff7ed" stroke="#fdba74"/>
  <text x="98" y="257" class="req">POST /api/users    Body: {"name":"HIT","email":"hit@example.com"}</text>

  <line x1="420" y1="286" x2="420" y2="316" stroke="#64748b" stroke-width="3"/>
  <line x1="905" y1="286" x2="905" y2="316" stroke="#64748b" stroke-width="3"/>

  <rect x="50" y="318" width="740" height="272" rx="18" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="420" y="366" text-anchor="middle" class="groupTitle">Web Data Binding</text>
  <text x="420" y="394" text-anchor="middle" class="groupSub">WebDataBinder bind path/query/form fields to parameters</text>

  <text x="95" y="438" class="label">@PathVariable</text>
  <text x="300" y="438" class="text">URL template vars</text>
  <text x="520" y="438" class="code">/users/{id}</text>

  <text x="95" y="484" class="label">@RequestParam</text>
  <text x="300" y="484" class="text">query or form fields</text>
  <text x="520" y="484" class="code">?sort=name&amp;order=asc</text>

  <text x="95" y="530" class="label">@ModelAttribute</text>
  <text x="300" y="530" class="text">bind many fields into object</text>
  <text x="520" y="530" class="code">username, email, password</text>

  <rect x="820" y="318" width="330" height="272" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="985" y="366" text-anchor="middle" class="groupTitle">@RequestBody</text>
  <text x="985" y="394" text-anchor="middle" class="groupSub">Body Deserialization</text>

  <text x="845" y="438" class="text">Read raw HTTP body, then use</text>
  <text x="845" y="468" class="code">HttpMessageConverter</text>
  <text x="845" y="498" class="text">to deserialize JSON/XML</text>
  <text x="845" y="528" class="text">into a Java object (DTO).</text>
</svg>
