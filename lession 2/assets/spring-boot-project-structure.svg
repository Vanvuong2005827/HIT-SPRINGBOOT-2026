<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" role="img" aria-labelledby="title desc">
  <title id="title">Spring Boot Project Structure</title>
  <desc id="desc">Diagram showing the folder structure of a Spring Boot project after creating from Spring Initializr</desc>

  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .folder { font: 700 17px 'Consolas', monospace; fill: #1d4ed8; }
      .file { font: 500 16px 'Consolas', monospace; fill: #334155; }
      .comment { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #16a34a; }
      .highlight { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #db2777; }
      .tree-line { stroke: #94a3b8; stroke-width: 1.5; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="680" fill="url(#bg)" rx="12"/>
  <text x="500" y="42" text-anchor="middle" class="title">Cấu trúc dự án Spring Boot</text>

  <!-- Main project folder -->
  <text x="40" y="80" class="folder">demo/</text>

  <!-- src/main/java -->
  <line x1="55" y1="88" x2="55" y2="108" class="tree-line"/>
  <line x1="55" y1="108" x2="75" y2="108" class="tree-line"/>
  <text x="80" y="112" class="folder">src/</text>

  <line x1="95" y1="120" x2="95" y2="140" class="tree-line"/>
  <line x1="95" y1="140" x2="115" y2="140" class="tree-line"/>
  <text x="120" y="144" class="folder">main/</text>

  <line x1="135" y1="152" x2="135" y2="172" class="tree-line"/>
  <line x1="135" y1="172" x2="155" y2="172" class="tree-line"/>
  <text x="160" y="176" class="folder">java/com/example/demo/</text>
  <text x="530" y="176" class="comment">← Package gốc (base package)</text>

  <!-- DemoApplication.java -->
  <line x1="175" y1="184" x2="175" y2="204" class="tree-line"/>
  <line x1="175" y1="204" x2="195" y2="204" class="tree-line"/>
  <text x="200" y="208" class="file">DemoApplication.java</text>
  <text x="530" y="208" class="highlight">Class chính — @SpringBootApplication</text>

  <!-- Sub-packages -->
  <line x1="175" y1="212" x2="175" y2="236" class="tree-line"/>
  <line x1="175" y1="236" x2="195" y2="236" class="tree-line"/>
  <text x="200" y="240" class="folder">controller/</text>
  <text x="530" y="240" class="comment">← Chứa các REST Controller</text>

  <line x1="215" y1="248" x2="215" y2="264" class="tree-line"/>
  <line x1="215" y1="264" x2="235" y2="264" class="tree-line"/>
  <text x="240" y="268" class="file">UserController.java</text>

  <line x1="175" y1="244" x2="175" y2="296" class="tree-line"/>
  <line x1="175" y1="296" x2="195" y2="296" class="tree-line"/>
  <text x="200" y="300" class="folder">service/</text>
  <text x="530" y="300" class="comment">← Chứa Business Logic</text>

  <line x1="215" y1="308" x2="215" y2="324" class="tree-line"/>
  <line x1="215" y1="324" x2="235" y2="324" class="tree-line"/>
  <text x="240" y="328" class="file">UserService.java</text>

  <line x1="175" y1="304" x2="175" y2="356" class="tree-line"/>
  <line x1="175" y1="356" x2="195" y2="356" class="tree-line"/>
  <text x="200" y="360" class="folder">repository/</text>
  <text x="530" y="360" class="comment">← Chứa Data Access (JPA)</text>

  <line x1="175" y1="364" x2="175" y2="416" class="tree-line"/>
  <line x1="175" y1="416" x2="195" y2="416" class="tree-line"/>
  <text x="200" y="420" class="folder">model/</text>
  <text x="530" y="420" class="comment">← Chứa Entity / DTO classes</text>

  <!-- resources -->
  <line x1="135" y1="172" x2="135" y2="460" class="tree-line"/>
  <line x1="135" y1="460" x2="155" y2="460" class="tree-line"/>
  <text x="160" y="464" class="folder">resources/</text>

  <line x1="175" y1="472" x2="175" y2="492" class="tree-line"/>
  <line x1="175" y1="492" x2="195" y2="492" class="tree-line"/>
  <text x="200" y="496" class="file">application.properties</text>
  <text x="530" y="496" class="highlight">File cấu hình chính (port, DB...)</text>

  <line x1="175" y1="500" x2="175" y2="524" class="tree-line"/>
  <line x1="175" y1="524" x2="195" y2="524" class="tree-line"/>
  <text x="200" y="528" class="folder">static/</text>
  <text x="530" y="528" class="comment">← File tĩnh (CSS, JS, images)</text>

  <line x1="175" y1="532" x2="175" y2="556" class="tree-line"/>
  <line x1="175" y1="556" x2="195" y2="556" class="tree-line"/>
  <text x="200" y="560" class="folder">templates/</text>
  <text x="530" y="560" class="comment">← Template HTML (Thymeleaf)</text>

  <!-- test -->
  <line x1="95" y1="140" x2="95" y2="590" class="tree-line"/>
  <line x1="95" y1="590" x2="115" y2="590" class="tree-line"/>
  <text x="120" y="594" class="folder">test/</text>
  <text x="530" y="594" class="comment">← Unit test / Integration test</text>

  <!-- pom.xml -->
  <line x1="55" y1="88" x2="55" y2="630" class="tree-line"/>
  <line x1="55" y1="630" x2="75" y2="630" class="tree-line"/>
  <text x="80" y="634" class="file">pom.xml</text>
  <text x="530" y="634" class="highlight">Quản lý dependency (Maven)</text>

  <!-- mvnw -->
  <line x1="55" y1="638" x2="55" y2="660" class="tree-line"/>
  <line x1="55" y1="660" x2="75" y2="660" class="tree-line"/>
  <text x="80" y="664" class="file">mvnw / mvnw.cmd</text>
  <text x="530" y="664" class="comment">← Maven Wrapper (không cần cài Maven)</text>
</svg>
