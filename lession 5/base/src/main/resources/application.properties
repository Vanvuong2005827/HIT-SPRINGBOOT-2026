# ============================================================
# APPLICATION
# ============================================================
spring.application.name=hit-springboot-base

# ============================================================
# SERVER — Embedded Tomcat
# ============================================================
server.port=8080

# ============================================================
# DATABASE — MySQL Connection
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/hit_springboot?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Batch insert/update de ghi nhieu records hieu qua hon
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# JACKSON — JSON Serialization
# ============================================================
spring.jackson.serialization.indent-output=true
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ============================================================
# SWAGGER / SPRINGDOC
# ============================================================
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.hit.springboot=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
