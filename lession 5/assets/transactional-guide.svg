<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="820" height="380" fill="url(#bg4)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">@Transactional — Khi nào dùng và cách hoạt động</text>

  <!-- Left: When to use -->
  <rect x="15" y="55" width="380" height="285" rx="10" fill="#0d47a115" stroke="#1565c088" stroke-width="1.5"/>
  <text x="205" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#42a5f5">Khi nào cần @Transactional?</text>

  <!-- Item 1 -->
  <rect x="30" y="94" width="350" height="44" rx="6" fill="#1565c0" opacity="0.6"/>
  <text x="50" y="113" font-size="12" fill="#fff" font-weight="bold">✅ Ghi nhiều bảng cùng lúc</text>
  <text x="50" y="130" font-size="10.5" fill="#90caf9">  Chuyển tiền: trừ A + cộng B = 1 transaction</text>

  <!-- Item 2 -->
  <rect x="30" y="143" width="350" height="44" rx="6" fill="#1565c0" opacity="0.5"/>
  <text x="50" y="162" font-size="12" fill="#fff" font-weight="bold">✅ CRUD có logic nghiệp vụ</text>
  <text x="50" y="179" font-size="10.5" fill="#90caf9">  Tạo Order + cập nhật tồn kho + ghi log</text>

  <!-- Item 3 -->
  <rect x="30" y="192" width="350" height="44" rx="6" fill="#1565c0" opacity="0.4"/>
  <text x="50" y="211" font-size="12" fill="#fff" font-weight="bold">✅ Đọc cần consistent snapshot</text>
  <text x="50" y="228" font-size="10.5" fill="#90caf9">  readOnly=true để tránh dirty read</text>

  <!-- Item 4 - Don'ts -->
  <rect x="30" y="241" width="350" height="44" rx="6" fill="#b71c1c44" stroke="#e5737333"/>
  <text x="50" y="260" font-size="12" fill="#e57373" font-weight="bold">❌ Không cần @Transactional khi:</text>
  <text x="50" y="277" font-size="10.5" fill="#ef9a9a">  Chỉ đọc 1 bảng, gọi API ngoài, gửi email...</text>

  <rect x="30" y="292" width="350" height="35" rx="6" fill="#ff8f0015" stroke="#ff8f0033"/>
  <text x="50" y="312" font-size="10.5" fill="#ffa726" font-weight="bold">⚠️ Không đặt @TX ở Controller, Repository!</text>
  <text x="50" y="326" font-size="10" fill="#ffcc80">  Chỉ đặt ở Service layer</text>

  <!-- Right: How it works -->
  <rect x="420" y="55" width="385" height="285" rx="10" fill="#00695c15" stroke="#00695c88" stroke-width="1.5"/>
  <text x="612" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#4db6ac">Các thuộc tính @Transactional</text>

  <!-- propagation -->
  <rect x="435" y="94" width="355" height="52" rx="6" fill="#37474f" opacity="0.8"/>
  <text x="455" y="114" font-size="11" font-weight="bold" fill="#ffd54f">propagation =</text>
  <text x="455" y="132" font-size="10" fill="#e0e0e0">REQUIRED (mặc định) — tham gia TX hiện có hoặc tạo mới</text>
  <text x="455" y="144" font-size="10" fill="#90a4ae">  • REQUIRES_NEW — luôn tạo TX mới | NEVER — không dùng TX</text>

  <!-- isolation -->
  <rect x="435" y="152" width="355" height="52" rx="6" fill="#37474f" opacity="0.7"/>
  <text x="455" y="172" font-size="11" font-weight="bold" fill="#ffd54f">isolation =</text>
  <text x="455" y="190" font-size="10" fill="#e0e0e0">DEFAULT — theo DB (READ_COMMITTED cho MySQL)</text>
  <text x="455" y="204" font-size="10" fill="#90a4ae">  • READ_UNCOMMITTED | REPEATABLE_READ | SERIALIZABLE</text>

  <!-- rollbackFor -->
  <rect x="435" y="210" width="355" height="40" rx="6" fill="#37474f" opacity="0.65"/>
  <text x="455" y="230" font-size="11" font-weight="bold" fill="#ffd54f">rollbackFor = Exception.class</text>
  <text x="455" y="246" font-size="10" fill="#e0e0e0">  Mặc định chỉ rollback RuntimeException — thêm checked nếu cần</text>

  <!-- readOnly -->
  <rect x="435" y="256" width="355" height="40" rx="6" fill="#37474f" opacity="0.6"/>
  <text x="455" y="276" font-size="11" font-weight="bold" fill="#ffd54f">readOnly = true</text>
  <text x="455" y="292" font-size="10" fill="#e0e0e0">  Tối ưu cho read operations — Hibernate skip dirty checking</text>

  <!-- timeout -->
  <rect x="435" y="302" width="355" height="30" rx="6" fill="#37474f" opacity="0.55"/>
  <text x="455" y="322" font-size="11" fill="#e0e0e0"><tspan font-weight="bold" fill="#ffd54f">timeout = 30</tspan> — Tự động rollback nếu TX chạy quá 30 giây</text>

  <!-- Footer -->
  <text x="410" y="365" text-anchor="middle" font-size="10.5" fill="#6e7681">Spring dùng AOP Proxy để tự động quản lý transaction — không cần viết try-catch JDBC thủ công</text>
</svg>
