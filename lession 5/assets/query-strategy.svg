<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
  </defs>
  <rect width="820" height="400" fill="url(#bg5)" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">Query Strategy — Khi nào dùng gì?</text>

  <!-- Column headers -->
  <rect x="20" y="52" width="188" height="34" rx="6" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="114" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">JpaRepository Methods</text>

  <rect x="218" y="52" width="188" height="34" rx="6" fill="#6a1b9a" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="312" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Derived Query</text>

  <rect x="416" y="52" width="188" height="34" rx="6" fill="#00695c" stroke="#26a69a" stroke-width="1.5"/>
  <text x="510" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">@Query JPQL</text>

  <rect x="614" y="52" width="188" height="34" rx="6" fill="#e65100" stroke="#ff7043" stroke-width="1.5"/>
  <text x="708" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Native SQL</text>

  <!-- Rows -->
  <!-- Row 1: Khi nào dùng -->
  <text x="20" y="107" font-size="10" font-weight="bold" fill="#90a4ae">KHI NÀO:</text>
  <rect x="20" y="112" width="188" height="55" rx="5" fill="#1565c022"/>
  <text x="114" y="132" text-anchor="middle" font-size="10" fill="#90caf9">CRUD cơ bản:</text>
  <text x="114" y="148" text-anchor="middle" font-size="10" fill="#90caf9">save, findById,</text>
  <text x="114" y="164" text-anchor="middle" font-size="10" fill="#90caf9">findAll, deleteById</text>

  <rect x="218" y="112" width="188" height="55" rx="5" fill="#6a1b9a22"/>
  <text x="312" y="132" text-anchor="middle" font-size="10" fill="#ce93d8">Query đơn giản</text>
  <text x="312" y="148" text-anchor="middle" font-size="10" fill="#ce93d8">từ 1-2 điều kiện:</text>
  <text x="312" y="164" text-anchor="middle" font-size="10" fill="#ce93d8">findByEmail, existsBy</text>

  <rect x="416" y="112" width="188" height="55" rx="5" fill="#00695c22"/>
  <text x="510" y="132" text-anchor="middle" font-size="10" fill="#80cbc4">Query phức tạp,</text>
  <text x="510" y="148" text-anchor="middle" font-size="10" fill="#80cbc4">JOIN FETCH,</text>
  <text x="510" y="164" text-anchor="middle" font-size="10" fill="#80cbc4">GROUP BY, subquery</text>

  <rect x="614" y="112" width="188" height="55" rx="5" fill="#e6510022"/>
  <text x="708" y="132" text-anchor="middle" font-size="10" fill="#ffab91">Cần tính năng DB</text>
  <text x="708" y="148" text-anchor="middle" font-size="10" fill="#ffab91">đặc trưng: FULL TEXT,</text>
  <text x="708" y="164" text-anchor="middle" font-size="10" fill="#ffab91">JSON_CONTAINS...</text>

  <!-- Row 2: Ví dụ -->
  <text x="20" y="183" font-size="10" font-weight="bold" fill="#90a4ae">VÍ DỤ:</text>
  <rect x="20" y="188" width="188" height="70" rx="5" fill="#1565c015"/>
  <text x="30" y="208" font-size="9.5" fill="#64b5f6" font-family="monospace">userRepository.save(u)</text>
  <text x="30" y="224" font-size="9.5" fill="#64b5f6" font-family="monospace">findById(id)</text>
  <text x="30" y="240" font-size="9.5" fill="#64b5f6" font-family="monospace">findAll()</text>
  <text x="30" y="256" font-size="9.5" fill="#64b5f6" font-family="monospace">existsById(id)</text>

  <rect x="218" y="188" width="188" height="70" rx="5" fill="#6a1b9a15"/>
  <text x="228" y="208" font-size="9.5" fill="#ba68c8" font-family="monospace">findByEmail(email)</text>
  <text x="228" y="224" font-size="9.5" fill="#ba68c8" font-family="monospace">findByNameContaining</text>
  <text x="228" y="240" font-size="9.5" fill="#ba68c8" font-family="monospace">  (keyword)</text>
  <text x="228" y="256" font-size="9.5" fill="#ba68c8" font-family="monospace">existsByEmail(email)</text>

  <rect x="416" y="188" width="188" height="70" rx="5" fill="#00695c15"/>
  <text x="426" y="204" font-size="9" fill="#4db6ac" font-family="monospace">@Query("SELECT u</text>
  <text x="426" y="220" font-size="9" fill="#4db6ac" font-family="monospace">FROM User u</text>
  <text x="426" y="236" font-size="9" fill="#4db6ac" font-family="monospace">JOIN FETCH u.orders</text>
  <text x="426" y="252" font-size="9" fill="#4db6ac" font-family="monospace">WHERE u.active = true")</text>

  <rect x="614" y="188" width="188" height="70" rx="5" fill="#e6510015"/>
  <text x="624" y="204" font-size="9" fill="#ff8a65" font-family="monospace">@Query(value=</text>
  <text x="624" y="220" font-size="9" fill="#ff8a65" font-family="monospace">"SELECT * FROM users</text>
  <text x="624" y="236" font-size="9" fill="#ff8a65" font-family="monospace">WHERE MATCH(name)</text>
  <text x="624" y="252" font-size="9" fill="#ff8a65" font-family="monospace">AGAINST (:kw)",</text>
  <text x="624" y="265" font-size="9" fill="#ff8a65" font-family="monospace">nativeQuery = true)</text>

  <!-- Row 3: Performance -->
  <text x="20" y="280" font-size="10" font-weight="bold" fill="#90a4ae">PERFORMANCE:</text>
  <rect x="20" y="286" width="188" height="30" rx="5" fill="#1565c010"/>
  <text x="114" y="306" text-anchor="middle" font-size="10.5" fill="#ffd54f">⭐⭐⭐⭐⭐</text>

  <rect x="218" y="286" width="188" height="30" rx="5" fill="#6a1b9a10"/>
  <text x="312" y="306" text-anchor="middle" font-size="10.5" fill="#ffd54f">⭐⭐⭐⭐</text>

  <rect x="416" y="286" width="188" height="30" rx="5" fill="#00695c10"/>
  <text x="510" y="306" text-anchor="middle" font-size="10.5" fill="#ffd54f">⭐⭐⭐⭐ + JOIN</text>

  <rect x="614" y="286" width="188" height="30" rx="5" fill="#e6510010"/>
  <text x="708" y="306" text-anchor="middle" font-size="10.5" fill="#ffd54f">⭐⭐⭐⭐⭐ (manual)</text>

  <!-- Decision guide -->
  <rect x="20" y="328" width="780" height="48" rx="8" fill="#ffffff0a" stroke="#ffffff22" stroke-width="1"/>
  <text x="410" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffd54f">💡 Quy tắc chọn query:</text>
  <text x="410" y="368" text-anchor="middle" font-size="10.5" fill="#e0e0e0">CRUD cơ bản → JpaRepository | Điều kiện đơn → Derived Query | JOIN/GROUP BY → @Query JPQL | Tính năng riêng của DB → Native</text>
</svg>
